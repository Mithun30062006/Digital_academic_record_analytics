<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="css/admin.css">
</head>

<body>
  <div class="dashboard-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-top">
        <h2 class="logo-title">Mithun</h2>
        <nav class="menu">
          <a href="#" class="menu-item active">
            <i class="fa-solid fa-house"></i>
            <span>Dashboard</span>
          </a>
        </nav>
      </div>
      <div class="sidebar-bottom">
        <a href="#" class="menu-item logout">
          <i class="fa-solid fa-right-from-bracket"></i>
          <span>Logout</span>
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="header">
        <div class="header-left">
          <h1>Welcome back, Mithun</h1>
        </div>
        <div class="header-right">
          <div class="avatar">
            <img src="https://ui-avatars.com/api/?name=Mithun&background=0284c7&color=fff&rounded=true" alt="Avatar">
          </div>
        </div>
      </header>

      <div class="content-sections">
        <!-- Section 1 -->
        <section class="section">
          <h3 class="section-title">GENERAL ACTIONS</h3>
          <div class="cards-grid">
            <div class="card" onclick="window.location.href='academic.html'">
              <div class="icon-wrapper" style="background-color: #e0f2fe; color: #0284c7;">
                <i class="fa-solid fa-pen-to-square"></i>
              </div>
              <span class="card-label">Enter Marks</span>
            </div>
            <div class="card" onclick="window.location.href='attendance-roster.html'">
              <div class="icon-wrapper" style="background-color: #fce7f3; color: #db2777;">
                <i class="fa-solid fa-clipboard-user"></i>
              </div>
              <span class="card-label">Attendance Tracker</span>
            </div>
            <div class="card" onclick="window.location.href='course.html'">
              <div class="icon-wrapper" style="background-color: #fef08a; color: #ca8a04;">
                <i class="fa-solid fa-book"></i>
              </div>
              <span class="card-label">Course</span>
            </div>
            <div class="card" onclick="window.location.href='exam-schedule.html'">
              <div class="icon-wrapper" style="background-color: #e0e7ff; color: #4f46e5;">
                <i class="fa-solid fa-file-lines"></i>
              </div>
              <span class="card-label">Exam</span>
            </div>
          </div>
        </section>

        <!-- Section 2 -->
        <section class="section">
          <h3 class="section-title">STUDENT MANAGEMENT</h3>
          <div class="cards-grid">
            <!--
            <div class="card" onclick="window.location.href='student-list.html'">
              <div class="icon-wrapper" style="background-color: #dcfce7; color: #16a34a;">
                <i class="fa-solid fa-user-plus"></i>
              </div>
              <span class="card-label">Add Student</span>
            </div>
            -->
            <div class="card" onclick="window.location.href='update-student.html'">
              <div class="icon-wrapper" style="background-color: #e0f2fe; color: #0284c7;">
                <i class="fa-solid fa-user-pen"></i>
              </div>
              <span class="card-label">Update Student</span>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>
  <script src="js/admin.js"></script>
  <script>
    // Role check to prevent unauthorized access
    (function() {
      const role = localStorage.getItem('role');
      const token = localStorage.getItem('token');
      if (!token || role !== 'admin') {
        Swal.fire({ title: 'Access Denied', text: 'Admin privileges required.', icon: 'error' }).then(() => {
          window.location.href = 'index.html';
        });
      }
    })();
  </script>
</body>

</html>
