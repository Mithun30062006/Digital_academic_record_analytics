<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="js/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-gray-100 antialiased">
    <div id="root"></div>

    <script src="js/config.js"></script>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const SidebarItem = ({ icon, label, active, onClick }) => (
            <a
                onClick={(e) => {
                    e.preventDefault();
                    onClick();
                }}
                href="#"
                className={`flex items-center gap-3 px-4 py-3 rounded-lg cursor-pointer transition-all duration-200 ${active
                    ? 'bg-blue-100 text-blue-600 font-semibold shadow-sm'
                    : 'text-gray-600 hover:bg-gray-50'
                    }`}
            >
                {icon}
                <span className="text-sm">{label}</span>
            </a>
        );

        const MetricCard = ({ title, value, subtitle, subtitleColor, progressBar }) => (
            <div className="bg-white rounded-xl shadow-sm p-6 border border-gray-100 hover:shadow-md transition-shadow">
                <p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">{title}</p>
                <p className="text-3xl font-bold text-gray-800">{value}</p>
                {subtitle && (
                    <p className={`text-xs font-semibold mt-1 ${subtitleColor || 'text-gray-500'}`}>
                        {subtitle}
                    </p>
                )}
                {progressBar && (
                    <div className="w-full bg-gray-100 h-1.5 rounded-full mt-4 overflow-hidden">
                        <div className="bg-blue-600 h-full rounded-full" style={{ width: progressBar }}></div>
                    </div>
                )}
            </div>
        );

        const PerformanceChart = ({ data }) => {
            const canvasRef = React.useRef(null);
            const chartRef = React.useRef(null);

            useEffect(() => {
                if (!canvasRef.current || !data || data.length === 0) return;

                if (typeof ChartDataLabels !== 'undefined') {
                    Chart.register(ChartDataLabels);
                }

                const ctx = canvasRef.current.getContext('2d');
                if (chartRef.current) chartRef.current.destroy();

                const labels = data.map(d => d.semester);
                const datasets = [
                    {
                        label: 'Half 1',
                        data: data.map(d => d.data.half1 || 0),
                        backgroundColor: '#60a5fa',
                        borderRadius: 6,
                        barPercentage: 0.8,
                        categoryPercentage: 0.8
                    },
                    {
                        label: 'Half 2',
                        data: data.map(d => d.data.half2 || 0),
                        backgroundColor: '#818cf8',
                        borderRadius: 6,
                        barPercentage: 0.8,
                        categoryPercentage: 0.8
                    },
                    {
                        label: 'Sem Avg',
                        data: data.map(d => d.data.semester || 0),
                        backgroundColor: '#3b82f6',
                        borderRadius: 6,
                        barPercentage: 0.8,
                        categoryPercentage: 0.8
                    }
                ];

                chartRef.current = new Chart(ctx, {
                    type: 'bar',
                    data: { labels, datasets },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                display: false // Using custom legend in UI
                            },
                            datalabels: {
                                anchor: 'center',
                                align: 'center',
                                formatter: (val) => val > 0 ? val : '',
                                font: { size: 10, weight: 'bold' },
                                color: '#ffffff',
                                display: (ctx) => ctx.dataset.data[ctx.dataIndex] > 0
                            },
                            tooltip: {
                                backgroundColor: '#1e293b',
                                padding: 12,
                                usePointStyle: true
                            }
                        },
                        scales: {
                            y: { beginAtZero: true, max: 100, grid: { color: '#f1f5f9', borderDash: [5, 5] }, ticks: { font: { size: 10 }, color: '#94a3b8' } },
                            x: { grid: { display: false }, ticks: { font: { size: 11, weight: 'bold' }, color: '#475569' } }
                        },
                        layout: { padding: { top: 20 } }
                    }
                });

                return () => { if (chartRef.current) chartRef.current.destroy(); };
            }, [data]);

            return <canvas ref={canvasRef}></canvas>;
        };

        const Dashboard = () => {
            const [activeMenu, setActiveMenu] = useState('Dashboard');
            const [profile, setProfile] = useState(null);
            const [attendanceStats, setAttendanceStats] = useState({ percentage: 0 });
            const [performanceData, setPerformanceData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            useEffect(() => {
                const loadData = async () => {
                    const token = localStorage.getItem('token');
                    const studentId = localStorage.getItem('student_id');
                    const dbId = localStorage.getItem('db_id');

                    const role = localStorage.getItem('role');

                    if (!token || (!studentId && role !== 'admin')) {
                        window.location.href = 'index.html';
                        return;
                    }

                    setLoading(true);
                    setError(null);

                    try {
                        const headers = { 
                            'Authorization': `Bearer ${token}`,
                            'Cache-Control': 'no-cache',
                            'Pragma': 'no-cache'
                        };
                        const timestamp = Date.now();
                        let activeYear = null;

                        // 1. Load Profile (CRITICAL dependency for calculations)
                        let resolvedStudentIdForData = studentId;
                        let resolvedDbId = dbId;

                        try {
                            const profileRes = await fetch(`${API_URL}/students/${dbId || studentId}?v=${timestamp}`, { headers });
                            if (profileRes.ok) {
                                const profileData = await profileRes.json();
                                setProfile(profileData);
                                activeYear = profileData.year;
                                
                                // Sync identity
                                resolvedStudentIdForData = profileData.student_id;
                                resolvedDbId = profileData.id || profileData._id;

                                // Sync localStorage
                                localStorage.setItem('student_id', resolvedStudentIdForData);
                                if (resolvedDbId) localStorage.setItem('db_id', resolvedDbId);
                            } else {
                                throw new Error('Could not load student profile.');
                            }
                        } catch (e) { 
                            console.error('Profile fetch failed:', e);
                            setError('Failed to load profile data.');
                            return; 
                        }

                        if (activeYear) {
                            // 2. Load Attendance & Special Actions
                            try {
                                const [attendanceRes, specialRes] = await Promise.all([
                                    fetch(`${API_URL}/attendance?student_ids=${resolvedStudentIdForData}&v=${timestamp}`, { headers }),
                                    fetch(`${API_URL}/special-actions?year=${activeYear}&v=${timestamp}`, { headers })
                                ]);
                                // ... existing processing logic ...
                                if (attendanceRes.ok) {
                                    const records = await attendanceRes.json();
                                    const specialActions = specialRes.ok ? await specialRes.json() : [];
                                    const specialDates = specialActions.map(a => a.date);

                                    const grouped = {};
                                    records.forEach(r => {
                                        if (!grouped[r.date]) grouped[r.date] = {};
                                        grouped[r.date][r.session] = r.status;
                                    });

                                    let daysPresent = 0;
                                    let totalWorkingDays = 0;

                                    Object.keys(grouped).forEach(date => {
                                        if (specialDates.includes(date)) return;
                                        const day = grouped[date];
                                        const morningExists = day[1] !== undefined || day[2] !== undefined;
                                        const afternoonExists = day[3] !== undefined || day[4] !== undefined;
                                        totalWorkingDays += (morningExists ? 0.5 : 0) + (afternoonExists ? 0.5 : 0);
                                        if (day[1] === 'present' && day[2] === 'present') daysPresent += 0.5;
                                        if (day[3] === 'present' && day[4] === 'present') daysPresent += 0.5;
                                    });

                                    setAttendanceStats({ 
                                        percentage: totalWorkingDays > 0 ? Math.round((daysPresent / totalWorkingDays) * 100) : 0, 
                                        totalDays: totalWorkingDays,
                                        present: daysPresent,
                                        absent: totalWorkingDays - daysPresent,
                                        isLoaded: true
                                    });
                                }
                            } catch (e) { console.error('Attendance calculation failed:', e); }

                            // 3. Load Performance
                            try {
                                const performanceRes = await fetch(`${API_URL}/marks/performance/${resolvedDbId || resolvedStudentIdForData}?v=${timestamp}`, { headers });
                                if (performanceRes.ok) {
                                    const data = await performanceRes.json();
                                    console.log('Performance Data Received:', data);
                                    setPerformanceData(data);
                                } else {
                                    console.error('Failed to fetch performance data:', await performanceRes.text());
                                }
                            } catch (e) { console.error('Performance fetch failed:', e); }
                        }

                    } catch (err) {
                        console.error('Core loading error:', err);
                        setError(`System error: ${err.message}`);
                    } finally {
                        setLoading(false);
                    }
                };

                loadData();
            }, []);

            const menuItems = [
                { label: 'Dashboard', url: 'student.html', icon: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg> },
                { label: 'Academics', url: 'academics.html', icon: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg> },
                { label: 'Attendance', url: 'attendance.html', icon: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg> },
                { label: 'Exam', url: 'exam.html', icon: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" /></svg> },
                { label: 'Result', url: 'result.html', icon: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg> }
            ];

            if (loading || !profile) {
                return (
                    <div className="flex min-h-screen bg-gray-100 items-center justify-center">
                        <div className="animate-pulse flex flex-col items-center gap-4">
                            <div className="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center text-blue-600">
                                <svg className="w-6 h-6 animate-spin" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m0 0H15" /></svg>
                            </div>
                            <div className="text-xl font-bold text-gray-400">Loading your profile...</div>
                        </div>
                    </div>
                );
            }

            if (error) {
                return (
                    <div className="flex min-h-screen bg-gray-100 items-center justify-center">
                        <div className="text-center">
                            <div className="text-xl font-bold text-red-500 mb-2">Failed to load profile</div>
                            <div className="text-gray-500 text-sm mb-4">{error}</div>
                            <button onClick={() => {
                                localStorage.clear();
                                window.location.href = 'index.html';
                            }} className="bg-blue-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-blue-700 transition-colors">
                                Go to Login
                            </button>
                        </div>
                    </div>
                );
            }

            const getInitials = (name) => {
                if (!name) return 'U';
                const parts = name.split(' ');
                if (parts.length >= 2) return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
                return name.substring(0, 2).toUpperCase();
            }

            return (
                <div className="flex min-h-screen bg-gray-100">
                    {/* Sidebar */}
                    <div className="w-64 bg-white shadow-lg h-screen sticky top-0 flex flex-col p-6 z-10">
                        <h2 className="text-xl font-bold mb-10 text-gray-800 flex items-center gap-2">
                            <span className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white text-xs">U</span>
                            Student Portal
                        </h2>
                        <div className="space-y-1">
                            {menuItems.map(item => (
                                <SidebarItem
                                    key={item.label}
                                    label={item.label}
                                    icon={item.icon}
                                    active={activeMenu === item.label}
                                    onClick={() => {
                                        if (item.url && item.url !== '#') {
                                            window.location.href = item.url;
                                        } else {
                                            setActiveMenu(item.label);
                                        }
                                    }}
                                />
                            ))}
                        </div>
                        <div className="mt-auto pt-6 border-t">
                            <button
                                onClick={() => {
                                    localStorage.clear();
                                    window.location.href = 'index.html';
                                }}
                                className="flex items-center gap-3 px-4 py-2 text-red-500 hover:bg-red-50 rounded-lg w-full transition-colors text-sm font-medium"
                            >
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                                Logout
                            </button>
                        </div>
                    </div>

                    {/* Main Content Area */}
                    <div className="flex-1 p-8 overflow-y-auto">
                        <div className="max-w-6xl mx-auto">
                            <div className="flex justify-between items-center mb-8">
                                <h1 className="text-2xl font-bold text-gray-800">Student Dashboard</h1>
                            </div>

                            {/* Profile Card */}
                            <div className="bg-white rounded-2xl shadow-md p-8 mb-8 border border-gray-100">
                                <div className="flex flex-col md:flex-row gap-10">
                                    {/* Avatar Column */}
                                    <div className="flex flex-col items-center gap-4">
                                        <div className="w-32 h-32 rounded-full bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 p-1 shadow-xl">
                                            <div className="w-full h-full rounded-full bg-white flex items-center justify-center border-4 border-white overflow-hidden">
                                                <div className="w-full h-full bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 flex items-center justify-center text-white text-3xl font-extrabold">
                                                    {getInitials(profile.name)}
                                                </div>
                                            </div>
                                        </div>
                                        <div className="px-3 py-1 bg-green-100 text-green-600 text-[10px] font-bold rounded-full uppercase tracking-widest">Active</div>
                                    </div>

                                    {/* Info Content Column */}
                                    <div className="flex-grow">
                                        <div className="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
                                            <div>
                                                <h2 className="text-3xl font-extrabold text-gray-800">{profile.name}</h2>
                                                <p className="text-blue-600 font-semibold mt-1">Student ID: {profile.student_id}</p>
                                                <p className="text-gray-400 text-sm italic font-medium">Batch: {profile.batch}</p>
                                            </div>
                                            <div className="bg-gray-50 p-5 rounded-xl border border-gray-100 hidden lg:block min-w-[240px]">
                                                <div className="mb-3">
                                                    <p className="text-[10px] text-gray-400 font-bold uppercase mb-1 tracking-wider">Phone Number</p>
                                                    <p className="text-sm font-bold text-gray-700">{profile.mobile}</p>
                                                </div>
                                                <div>
                                                    <p className="text-[10px] text-gray-400 font-bold uppercase mb-1 tracking-wider">Email Address</p>
                                                    <p className="text-sm font-bold text-gray-700">{profile.email}</p>
                                                </div>
                                            </div>
                                        </div>

                                        <hr className="mb-6 border-gray-100" />

                                        {/* Profile Details Grid */}
                                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                                            {[
                                                { label: 'Department', value: profile.department, icon: <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" /></svg> },
                                                { label: 'Current Year', value: profile.year, icon: <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg> },
                                                { label: 'Current Semester', value: profile.semester || 'I', icon: <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg> }
                                            ].map((detail, idx) => (
                                                <div key={idx} className="flex flex-col">
                                                    <span className="text-[9px] font-bold text-gray-400 uppercase tracking-widest mb-1">{detail.label}</span>
                                                    <div className="flex items-center gap-2">
                                                        <span className="text-blue-500">{detail.icon}</span>
                                                        <span className="text-sm font-semibold text-gray-700 truncate">{detail.value}</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Academic Dashboard Metrics */}
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                                <MetricCard
                                    title="Current SGPA"
                                    value={performanceData.length > 0 ? (performanceData[performanceData.length - 1].sgpa > 0 ? performanceData[performanceData.length - 1].sgpa : "0.00") : "0.00"}
                                    subtitle={performanceData.length > 0 ? (performanceData[performanceData.length - 1].sgpa > 0 ? `Semester ${performanceData[performanceData.length - 1].semester}` : "Academic Progress") : "Processing Data"}
                                    subtitleColor="text-gray-500"
                                />
                                <MetricCard
                                    title="Overall CGPA"
                                    value={performanceData.length > 0 
                                        ? (performanceData.reduce((acc, curr) => acc + (Number(curr.sgpa) || 0), 0) / performanceData.length).toFixed(2)
                                        : "0.00"}
                                    subtitle={performanceData.length > 0 ? `Avg of ${performanceData.length} Semester(s)` : "Pending Results"}
                                />
                                <MetricCard
                                    title="Attendance"
                                    value={`${attendanceStats.percentage}%`}
                                    subtitle={attendanceStats.isLoaded ? `${attendanceStats.present} / ${attendanceStats.totalDays} Total Units` : "Syncing records..."}
                                    subtitleColor={attendanceStats.percentage >= 75 ? "text-green-500" : "text-amber-500"}
                                    progressBar={`${attendanceStats.percentage}%`}
                                />
                                <MetricCard
                                    title="Arrear Count"
                                    value="0"
                                    subtitle="No records found"
                                />
                            </div>

                            <div className="bg-white rounded-2xl shadow-md p-8 border border-gray-100">
                                <div className="flex items-center justify-between mb-8">
                                    <h3 className="text-xl font-bold text-gray-800 tracking-tight">Academic Progress</h3>
                                    <div className="flex gap-4">
                                        <div className="flex items-center gap-2">
                                            <div className="w-3 h-3 bg-blue-400 rounded-full"></div>
                                            <span className="text-[10px] font-bold text-gray-500">Half 1</span>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <div className="w-3 h-3 bg-indigo-400 rounded-full"></div>
                                            <span className="text-[10px] font-bold text-gray-500">Half 2</span>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <div className="w-3 h-3 bg-blue-600 rounded-full"></div>
                                            <span className="text-[10px] font-bold text-gray-500">Semester Avg</span>
                                        </div>
                                    </div>
                                </div>
                                <div className="h-72 w-full relative">
                                    {performanceData && performanceData.length > 0 ? (
                                        <PerformanceChart data={performanceData} />
                                    ) : (
                                        <div className="flex items-center justify-center h-full text-gray-300 text-xs italic font-medium">
                                            No academic data available yet
                                        </div>
                                    )}
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>

</html>
