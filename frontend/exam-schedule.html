<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Schedule Setup</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="css/exam.css">
</head>

<body class="exam-body">
    <div class="exam-container">
        <!-- Header -->
        <header class="exam-header">
            <div class="header-left">
                <a href="admin.html" class="back-arrow"><i class="fa-solid fa-arrow-left"></i></a>
                <h1 class="page-title">Exam Schedule Setup</h1>
            </div>
        </header>

        <!-- General Information Section -->
        <section class="exam-card">
            <h2 class="card-title" style="margin-bottom: 25px;">General Information</h2>
            <div class="form-grid">
                <div class="form-field">
                    <label class="form-label">Select Department</label>
                    <select class="form-select" id="deptSelect" onchange="checkSelection()">
                        <option value="" disabled selected>Choose Department</option>
                        <option value="eee">Electrical and Electronics Engineering</option>
                        <option value="ece">Electronics and Communication Engineering</option>
                        <option value="cse">Computer Science and Engineering</option>
                        <option value="it">Information Technology</option>
                    </select>
                </div>
                <div class="form-field">
                    <label class="form-label">Select Semester</label>
                    <select class="form-select" id="yearSelect" onchange="checkSelection()">
                        <option value="" disabled selected>Choose Semester</option>
                        <option value="I">I</option>
                        <option value="II">II</option>
                        <option value="III">III</option>
                        <option value="IV">IV</option>
                        <option value="V">V</option>
                        <option value="VI">VI</option>
                        <option value="VII">VII</option>
                        <option value="VIII">VIII</option>
                    </select>
                </div>
                <div class="form-field">
                    <label class="form-label">Exam Type</label>
                    <select class="form-select" id="examTypeSelect" onchange="checkSelection()">
                        <option value="" disabled selected>Choose Exam Type</option>
                        <option value="half1">Half 1</option>
                        <option value="half2">Half 2</option>
                        <option value="model">Model</option>
                        <option value="semester">Semester</option>
                    </select>
                </div>
                <div class="form-field">
                    <label class="form-label">Number of Subject</label>


                    <input type="number" class="form-input" id="numRows" value="1" min="1" max="20"
                        onchange="updateTable()">
                </div>
            </div>
        </section>
        <!-- History Section -->
        <section class="exam-card" id="historySection" style="display: none;">
            <div class="card-header">
                <h2 class="card-title">History</h2>
                <span class="badge">Previous Schedules</span>
            </div>
            <div class="table-container">
                <table class="exam-table">
                    <thead>
                        <tr>
                            <th>DEPARTMENT</th>
                            <th>SEMESTER</th>
                            <th>EXAM TYPE</th>
                            <th>ACTION</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody">
                        <!-- History data will be injected here -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Schedule Entries Section -->
        <section class="exam-card" id="scheduleEntriesSection" style="display: none;">
            <div class="card-header">
                <h2 class="card-title">Schedule Entries</h2>
                <span class="badge" id="rowBadge">1 Subject Configured</span>

            </div>

            <div class="table-container">
                <table class="exam-table">
                    <thead>
                        <tr>
                            <th style="width: 50px;">S.NO</th>
                            <th style="width: 150px;">DATE</th>
                            <th style="width: 120px;">FROM TIME</th>
                            <th style="width: 120px;">TO TIME</th>
                            <th>SUBJECT</th>
                            <th style="width: 150px;">VENUE</th>
                            <th style="width: 100px;">SESSION</th>
                        </tr>

                    </thead>
                    <tbody id="scheduleBody">
                        <!-- Rows generated by JS -->
                    </tbody>
                </table>
            </div>

            <button class="save-btn" onclick="saveSchedule()">SAVE SCHEDULE</button>
        </section>
    </div>

    <!-- Toast Container -->
    <div id="toastContainerRight" class="toast-container right"></div>

    <!-- Datalist removed as per user request to use plain text typing -->

    <script src="js/config.js"></script>
    <script>
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainerRight');
            const toast = document.createElement('div');
            
            const iconClass = type === 'error' ? 'fa-solid fa-triangle-exclamation' : 'fa-solid fa-circle-check';
            const animationClass = 'slide-in-right';
            
            toast.className = `toast ${type} ${animationClass}`;
            toast.innerHTML = `
                <i class="${iconClass}"></i>
                <span class="toast-message">${message}</span>
            `;

            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.add('fade-out');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function updateTable() {
            const numRows = document.getElementById('numRows').value;
            const body = document.getElementById('scheduleBody');
            const badge = document.getElementById('rowBadge');

            badge.innerText = `${numRows} ${numRows == 1 ? 'Subject' : 'Subjects'} Configured`;


            let html = '';
            for (let i = 1; i <= numRows; i++) {
                const sno = i < 10 ? '0' + i : i;
                html += `
                    <tr class="schedule-row">
                        <td>${sno}</td>
                        <td><input type="date" class="table-input row-date" onclick="this.showPicker()"></td>
                        <td><input type="time" class="table-input row-from" onclick="this.showPicker()"></td>
                        <td><input type="time" class="table-input row-to" onclick="this.showPicker()"></td>
                        <td>
                            <input type="text" class="table-input row-subject" placeholder="Enter Subject...">
                        </td>
                        <td>
                            <input type="text" class="table-input row-venue" placeholder="Enter Venue...">
                        </td>
                        <td>

                            <select class="table-input row-session">
                                <option value="FN">FN</option>
                                <option value="AN">AN</option>
                            </select>
                        </td>
                    </tr>
                `;
            }
            body.innerHTML = html;
        }

        function saveSchedule() {
            const deptSelect = document.getElementById('deptSelect');
            const yearSelect = document.getElementById('yearSelect');
            const examTypeSelect = document.getElementById('examTypeSelect');

            if (!deptSelect.value || !yearSelect.value) {
                showToast('Please select Department and Year.', 'error');
                return;
            }


            const rows = document.querySelectorAll('.schedule-row');
            const scheduleEntries = [];

            for (let row of rows) {
                const date = row.querySelector('.row-date').value;
                const from = row.querySelector('.row-from').value;
                const to = row.querySelector('.row-to').value;
                const subject = row.querySelector('.row-subject').value;
                const venue = row.querySelector('.row-venue').value;
                const session = row.querySelector('.row-session').value;

                if (!date || !from || !to || !subject || !venue) {
                    showToast('Please fill all fields for all rows.', 'error');
                    return;
                }

                scheduleEntries.push({ date, from, to, subject, venue, session });
            }


            const scheduleData = {
                department: deptSelect.options[deptSelect.selectedIndex].text,
                subDept: "Department of Engineering", // Static for now as per design
                year: yearSelect.value,
                examType: examTypeSelect.options[examTypeSelect.selectedIndex].text,
                entries: scheduleEntries
            };


            localStorage.setItem('savedSchedule', JSON.stringify(scheduleData));
            window.location.href = 'edit-exam-schedule.html';
        }

        async function checkSelection() {
            const deptEl = document.getElementById('deptSelect');
            const yearEl = document.getElementById('yearSelect');
            const examTypeEl = document.getElementById('examTypeSelect');
            const historySection = document.getElementById('historySection');
            const scheduleEntriesSection = document.getElementById('scheduleEntriesSection');

            const dept = deptEl.value;
            const year = yearEl.value;
            const examType = examTypeEl.value;

            // Reset both sections if not all 3 are selected
            if (!dept || !year || !examType) {
                historySection.style.display = 'none';
                scheduleEntriesSection.style.display = 'none';
                return;
            }

            // All 3 selected — check if data exists
            const deptText = deptEl.options[deptEl.selectedIndex].text;
            const examTypeText = examTypeEl.options[examTypeEl.selectedIndex].text;

            try {
                const response = await fetch(
                    `${API_URL}/exam-schedule?department=${encodeURIComponent(deptText)}&year=${encodeURIComponent(year)}&examType=${encodeURIComponent(examTypeText)}`
                );
                if (response.ok) {
                    const schedules = await response.json();
                    if (schedules.length > 0) {
                        // Data exists — show history
                        historySection.style.display = 'block';
                        scheduleEntriesSection.style.display = 'none';
                        loadHistory();
                    } else {
                        // No data — show schedule entries form
                        historySection.style.display = 'none';
                        scheduleEntriesSection.style.display = 'block';
                    }
                } else {
                    historySection.style.display = 'none';
                    scheduleEntriesSection.style.display = 'block';
                }
            } catch (err) {
                console.error('checkSelection API Error:', err);
                historySection.style.display = 'none';
                scheduleEntriesSection.style.display = 'block';
            }
        }

        let fetchedSchedules = [];

        async function loadHistory() {
            const historyBody = document.getElementById('historyBody');
            const dept = document.getElementById('deptSelect');
            const deptText = dept.options[dept.selectedIndex].text;
            const year = document.getElementById('yearSelect').value;

            try {
                const response = await fetch(`${API_URL}/exam-schedule?department=${encodeURIComponent(deptText)}&year=${encodeURIComponent(year)}`);
                if (response.ok) {
                    const schedules = await response.json();
                    fetchedSchedules = schedules; // Store for viewing details
                    
                    if (schedules.length === 0) {
                        historyBody.innerHTML = `
                            <tr>
                                <td colspan="4" style="text-align: center; color: #94a3b8; padding: 30px;">
                                    No records found for the selected criteria
                                </td>
                            </tr>
                        `;
                        return;
                    }

                    let html = '';
                    schedules.forEach(item => {
                        html += `
                            <tr>
                                <td>${item.department}</td>
                                <td>${item.year}</td>
                                <td>${item.examType}</td>
                                <td>
                                    <div style="display: flex; gap: 10px; align-items: center;">
                                        <button class="badge" style="border:none; cursor:pointer;" onclick="viewHistoryItem('${item._id}')">View Details</button>
                                        <button class="badge" style="border:none; cursor:pointer; background: #fee2e2; color: #ef4444;" onclick="deleteHistoryItem('${item._id}')">
                                            <i class="fa-solid fa-trash-can"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        `;
                    });
                    historyBody.innerHTML = html;
                } else {
                    historyBody.innerHTML = '<tr><td colspan="4">Error loading history</td></tr>';
                }
            } catch (err) {
                console.error('History API Error:', err);
                historyBody.innerHTML = '<tr><td colspan="4">Failed to connect to server</td></tr>';
            }
        }

        async function deleteHistoryItem(id) {
            const result = await Swal.fire({
                title: 'Delete Schedule?',
                text: 'Are you sure you want to delete this exam schedule? This action cannot be undone.',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#94a3b8',
                confirmButtonText: 'Yes, delete it!'
            });
            if (!result.isConfirmed) return;

            try {
                const response = await fetch(`${API_URL}/exam-schedule/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });

                if (response.ok) {
                    showToast('Schedule deleted successfully.');
                    loadHistory(); // Refresh to reflect changes
                } else {
                    const error = await response.json();
                    showToast('Error deleting schedule: ' + (error.error || error.message || 'Unknown error'), 'error');
                }
            } catch (err) {
                console.error('Delete API Error:', err);
                showToast('Failed to delete schedule.', 'error');
            }
        }

        function viewHistoryItem(id) {
            const schedule = fetchedSchedules.find(s => s._id === id);
            if (schedule) {
                localStorage.setItem('savedSchedule', JSON.stringify(schedule));
                window.location.href = 'edit-exam-schedule.html';
            } else {
                showToast('Schedule data not found.', 'error');
            }
        }

        // Initial render
        updateTable();
    </script>
    <script>
        // Role check to prevent unauthorized access
        (function() {
          const role = localStorage.getItem('role');
          const token = localStorage.getItem('token');
          if (!token || role !== 'admin') {
            Swal.fire({ title: 'Access Denied', text: 'Admin privileges required.', icon: 'error' }).then(() => {
                window.location.href = 'index.html';
            });
          }
        })();
    </script>
</body>

</html>
