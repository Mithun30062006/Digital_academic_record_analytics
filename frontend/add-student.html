<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Student - Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #f1f5f9;
            color: #334155;
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        .header {
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-btn {
            background: #ffffff;
            color: #64748b;
            border: 1px solid #e2e8f0;
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 18px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
        }

        .back-btn:hover {
            color: #2563eb;
            border-color: #2563eb;
            transform: translateX(-4px);
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1e293b;
        }

        .form-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
        }

        .form-header {
            margin-bottom: 30px;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 20px;
        }

        .form-header h2 {
            font-size: 20px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 4px;
        }

        .form-header p {
            font-size: 14px;
            color: #64748b;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #475569;
            margin-bottom: 8px;
        }

        .form-input,
        .form-select {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            color: #1e293b;
            transition: all 0.3s ease;
            outline: none;
            background-color: #f8fafc;
        }

        .form-input:focus,
        .form-select:focus {
            border-color: #3b82f6;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .form-input::placeholder {
            color: #94a3b8;
        }

        /* Password Toggle Styles */
        .password-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .toggle-icon {
            position: absolute;
            right: 16px;
            color: #94a3b8;
            cursor: pointer;
            transition: color 0.3s;
            font-size: 16px;
        }

        .toggle-icon:hover {
            color: #2563eb;
        }

        .btn-group {
            display: flex;
            gap: 16px;
            margin-top: 40px;
        }

        .btn {
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: none;
        }

        .btn-primary {
            background: #2563eb;
            color: #ffffff;
            flex: 2;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .btn-primary:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.3);
        }

        .btn-secondary {
            background: #f1f5f9;
            color: #64748b;
            flex: 1;
            text-decoration: none;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
            color: #475569;
        }

        @media (max-width: 640px) {
            .form-card {
                padding: 24px;
            }

            .btn-group {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <a href="admin.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
            <h1>Add New Student</h1>
        </div>

        <div class="form-card">
            <div class="form-header">
                <h2>Student Information</h2>
                <p>Enter the details to register a new student to the portal.</p>
            </div>

            <form id="studentForm">
                <div class="form-group">
                    <label class="form-label">Student Name</label>
                    <input type="text" id="studentName" class="form-input" placeholder="e.g. John Doe" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Student ID</label>
                    <input type="text" id="studentId" class="form-input" placeholder="e.g. 2023001" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="johndoe@university.edu" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="password" class="form-input" placeholder="********" required>
                        <i class="fa-solid fa-eye toggle-icon" id="togglePassword"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Mobile Number</label>
                    <input type="tel" id="mobile" class="form-input" placeholder="+1 (555) 000-0000" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Batch</label>
                    <input type="text" id="batch" class="form-input" placeholder="e.g. 2023 Summer" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Semester</label>
                    <select id="semester" class="form-select" required>
                        <option value="" disabled selected>Select Semester</option>
                        <option value="I">I</option>
                        <option value="II">II</option>
                        <option value="III">III</option>
                        <option value="IV">IV</option>
                        <option value="V">V</option>
                        <option value="VI">VI</option>
                        <option value="VII">VII</option>
                        <option value="VIII">VIII</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Department</label>
                    <select id="department" class="form-select" required>
                        <option value="" disabled selected>Select Department</option>
                        <option value="Electrical and Electronics Engineering">Electrical and Electronics Engineering</option>
                        <option value="Electronics and Communication Engineering">Electronics and Communication Engineering</option>
                        <option value="Computer Science and Engineering">Computer Science and Engineering</option>
                        <option value="Information Technology">Information Technology</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Academic Year</label>
                    <select id="year" class="form-select" required>
                        <option value="" disabled selected>Select Year</option>
                        <option value="I">I</option>
                        <option value="II">II</option>
                        <option value="III">III</option>
                        <option value="IV">IV</option>
                    </select>
                </div>

                <div class="btn-group">
                    <button type="submit" class="btn btn-primary">Register Student</button>
                    <a href="admin.html" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        document.getElementById('studentForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const studentData = {
                name: document.getElementById('studentName').value,
                student_id: document.getElementById('studentId').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                mobile: document.getElementById('mobile').value,
                batch: document.getElementById('batch').value,
                semester: document.getElementById('semester').value,
                department: document.getElementById('department').value,
                year: document.getElementById('year').value
            };

            try {
                const response = await fetch(`${API_URL}/students`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify(studentData)
                });

                if (response.ok) {
                    alert('Student registered successfully!');
                    window.location.href = 'admin.html';
                } else {
                    const error = await response.json();
                    alert('Error: ' + (error.message || 'Failed to register student'));
                }
            } catch (err) {
                console.error('Submission error:', err);
                // For demonstration purposes if backend isn't ready
                alert('Success! (Mock redirection to Student List)');
                window.location.href = 'student-list.html';
            }
        });

        // Password Toggle Logic
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            // Toggle icon classes
            togglePassword.classList.toggle('fa-eye');
            togglePassword.classList.toggle('fa-eye-slash');
        });
    </script>
</body>

</html>
