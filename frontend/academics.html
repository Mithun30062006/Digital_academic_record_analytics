<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academics - Student Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="js/config.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>

<body class="bg-gray-100 antialiased">
    <div id="root"></div>

    <script src="js/config.js"></script>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const SidebarItem = ({ icon, label, active, href }) => (
            <a
                href={href}
                className={`flex items-center gap-3 px-4 py-3 rounded-lg cursor-pointer transition-all duration-200 ${active
                    ? 'bg-blue-100 text-blue-600 font-semibold shadow-sm'
                    : 'text-gray-600 hover:bg-gray-50'
                    }`}
            >
                {icon}
                <span className="text-sm">{label}</span>
            </a>
        );

        const AcademicsPage = () => {
            const [profile, setProfile] = useState(null);
            const [departments, setDepartments] = useState([]);
            const [selectedSemester, setSelectedSemester] = useState('');
            const [selectedDeptId, setSelectedDeptId] = useState('');
            const [courses, setCourses] = useState([]);
            const [selectedCourse, setSelectedCourse] = useState(null);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [materials, setMaterials] = useState([]);
            const [loading, setLoading] = useState(true);
            const [searching, setSearching] = useState(false);
            const [error, setError] = useState(null);
            const [hasSearched, setHasSearched] = useState(false);

            useEffect(() => {
                const fetchData = async () => {
                    try {
                        const token = localStorage.getItem('token');
                        const studentId = localStorage.getItem('student_id');
                        const dbId = localStorage.getItem('db_id');

                        const role = localStorage.getItem('role');

                        if (!token || (!studentId && role !== 'admin')) {
                            window.location.href = 'index.html';
                            return;
                        }

                        // Fetch Profile & Departments in parallel
                        const [profileRes, deptsRes] = await Promise.all([
                            fetch(`${API_URL}/students/${dbId || studentId}`, { headers: { 'Authorization': `Bearer ${token}` } }),
                            fetch(`${API_URL}/departments/all`, { headers: { 'Authorization': `Bearer ${token}` } })
                        ]);

                        if (profileRes.ok && deptsRes.ok) {
                            const profileData = await profileRes.json();
                            const deptsData = await deptsRes.json();

                            setProfile(profileData);
                            setDepartments(deptsData);

                            // Sync student_id in localStorage if it changed
                            if (profileData.student_id && profileData.student_id !== studentId) {
                                localStorage.setItem('student_id', profileData.student_id);
                            }
                            // Also ensure db_id is set
                            if (profileData.id && !dbId) {
                                localStorage.setItem('db_id', profileData.id);
                            }

                            // No pre-selection, let user choose from dropdowns as per requirements
                            setSelectedSemester('');
                            setSelectedDeptId('');
                        } else {
                            setError('Failed to load initial data');
                        }
                    } catch (err) {
                        setError('Network error: ' + err.message);
                    } finally {
                        setLoading(false);
                    }
                };

                fetchData();
            }, []);

            const handleSearch = async () => {
                if (!selectedDeptId || !selectedSemester) return;

                setSearching(true);
                setHasSearched(true);
                try {
                    const token = localStorage.getItem('token');
                    const res = await fetch(`${API_URL}/departments/${selectedDeptId}/courses?semesterId=${selectedSemester}`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });

                    if (res.ok) {
                        const data = await res.json();
                        setCourses(data.courses || []);
                    } else {
                        console.error('Failed to fetch courses');
                    }
                } catch (err) {
                    console.error('Search error:', err);
                } finally {
                    setSearching(false);
                }
            };

            const openMaterials = async (courseId) => {
                setSelectedCourse(courses.find(c => c._id === courseId));
                setIsModalOpen(true);
                setMaterials([]);
                try {
                    const token = localStorage.getItem('token');
                    const res = await fetch(`${API_URL}/materials/${courseId}`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.ok) {
                        const data = await res.json();
                        setMaterials(data.units || []);
                    }
                } catch (err) {
                    console.error('Failed to load materials:', err);
                }
            };

            const MaterialsModal = ({ isOpen, onClose, course, materials }) => {
                if (!isOpen) return null;
                return (
                    <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
                        <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" onClick={onClose}></div>
                        <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md relative z-10 overflow-hidden animate-fade-in">
                            <div className="bg-blue-600 px-6 py-4 flex justify-between items-center text-white">
                                <div>
                                    <h3 className="font-bold text-lg leading-tight">{course?.name}</h3>
                                    <p className="text-xs text-blue-100 mt-1">Course Materials • Units 1-5</p>
                                </div>
                                <button onClick={onClose} className="p-1 hover:bg-black/10 rounded-full transition-colors">
                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12" /></svg>
                                </button>
                            </div>
                            <div className="p-6 max-h-[60vh] overflow-y-auto">
                                <div className="space-y-3">
                                    {[1, 2, 3, 4, 5].map(unitNum => {
                                        const unit = materials.find(u => u.unitNumber === unitNum);
                                        return (
                                            <div key={unitNum} className="flex items-center justify-between p-4 bg-gray-50 rounded-xl border border-gray-100">
                                                <div className="flex flex-col">
                                                    <span className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Unit {unitNum}</span>
                                                    {unit ? (
                                                        <a 
                                                            href={`${BASE_URL}/${unit.filePath}`} 
                                                            target="_blank" 
                                                            className="text-sm font-bold text-blue-600 hover:text-blue-800 transition-colors truncate max-w-[200px]"
                                                        >
                                                            {unit.fileName}
                                                        </a>
                                                    ) : (
                                                        <span className="text-sm font-medium text-gray-400">No file available</span>
                                                    )}
                                                </div>
                                                {unit && (
                                                    <a 
                                                        href={`${BASE_URL}/${unit.filePath}`} 
                                                        target="_blank"
                                                        className="w-10 h-10 bg-blue-100 text-blue-600 flex items-center justify-center rounded-xl hover:bg-blue-600 hover:text-white transition-all shadow-sm"
                                                    >
                                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                                                    </a>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                            <div className="p-4 bg-gray-50 border-t border-gray-100 flex justify-center">
                                <button onClick={onClose} className="px-8 py-2 bg-white border border-gray-200 text-gray-600 font-bold text-sm rounded-lg hover:bg-gray-100 transition-all">Close Viewer</button>
                            </div>
                        </div>
                    </div>
                );
            };

            const menuItems = [
                { label: 'Dashboard', url: 'student.html', icon: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg> },
                { label: 'Academics', url: 'academics.html', icon: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg> },
                { label: 'Attendance', url: 'attendance.html', icon: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg> },
                { label: 'Exam', url: 'exam.html', icon: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" /></svg> },
                { label: 'Result', url: 'result.html', icon: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg> }
            ];

            if (loading) {
                return (
                    <div className="flex min-h-screen bg-gray-100 items-center justify-center">
                        <div className="flex flex-col items-center gap-4">
                            <div className="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                            <div className="text-xl font-bold text-gray-400">Loading academics...</div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex min-h-screen bg-gray-100 font-inter">
                    {/* Sidebar */}
                    <div className="w-64 bg-white shadow-lg h-screen sticky top-0 flex flex-col p-6 z-10 transition-all duration-300">
                        <h2 className="text-xl font-bold mb-10 text-gray-800 flex items-center gap-3">
                            <span className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white text-xs shadow-lg">U</span>
                            <span className="tracking-tight">Student Portal</span>
                        </h2>
                        <div className="space-y-1 flex-grow">
                            {menuItems.map(item => (
                                <SidebarItem
                                    key={item.label}
                                    label={item.label}
                                    icon={item.icon}
                                    active={item.label === 'Academics'}
                                    href={item.url}
                                />
                            ))}
                        </div>
                        <div className="mt-auto pt-6 border-t border-gray-100">
                            <button
                                onClick={() => {
                                    localStorage.clear();
                                    window.location.href = 'index.html';
                                }}
                                className="flex items-center gap-3 px-4 py-2 text-red-500 hover:bg-red-50 rounded-lg w-full transition-all duration-200 text-sm font-medium"
                            >
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                                Logout
                            </button>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="flex-1 p-8 overflow-y-auto">
                        <div className="max-w-6xl mx-auto">
                            <div className="mb-10 animate-fade-in">
                                <h1 className="text-3xl font-extrabold text-gray-800 tracking-tight">Academics</h1>
                                <p className="text-gray-500 font-medium mt-1">Manage your semester selections, profile and course selections.</p>
                            </div>

                            {/* Controls Card */}
                            <div className="bg-white rounded-2xl shadow-xl shadow-gray-200/50 p-8 mb-8 border border-gray-100/50 animate-fade-in" style={{ animationDelay: '0.1s' }}>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                                    <div>
                                        <label className="block text-sm font-semibold text-gray-600 mb-3">Department</label>
                                        <div className="relative group">
                                            <select 
                                                value={selectedDeptId}
                                                onChange={(e) => setSelectedDeptId(e.target.value)}
                                                className="w-full bg-gray-50 border border-gray-100 rounded-xl px-4 py-4 text-sm text-gray-700 appearance-none focus:outline-none focus:ring-4 focus:ring-blue-50 focus:border-blue-500 transition-all cursor-pointer font-semibold"
                                            >
                                                <option value="" disabled>Choose Department...</option>
                                                {departments.map(d => (
                                                    <option key={d.id} value={d.id}>{d.name}</option>
                                                ))}
                                            </select>
                                            <div className="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-gray-400 group-hover:text-blue-500 transition-colors">
                                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7" /></svg>
                                            </div>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-semibold text-gray-600 mb-3">Semester</label>
                                        <div className="relative group">
                                            <select 
                                                value={selectedSemester}
                                                onChange={(e) => setSelectedSemester(e.target.value)}
                                                className="w-full bg-gray-50 border border-gray-100 rounded-xl px-4 py-4 text-sm text-gray-700 appearance-none focus:outline-none focus:ring-4 focus:ring-blue-50 focus:border-blue-500 transition-all cursor-pointer font-semibold"
                                            >
                                                <option value="" disabled>Choose Semester...</option>
                                                {['I', 'II', 'III', 'IV', 'V', 'VI', 'VII', 'VIII'].map(s => (
                                                    <option key={s} value={s}>{s}</option>
                                                ))}
                                            </select>
                                            <div className="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-gray-400 group-hover:text-blue-500 transition-colors">
                                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7" /></svg>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex justify-start">
                                    <button
                                        onClick={handleSearch}
                                        disabled={searching}
                                        className="bg-blue-600 hover:bg-blue-700 disabled:bg-blue-300 text-white font-bold py-4 px-10 rounded-xl shadow-lg shadow-blue-200 transition-all duration-200 flex items-center gap-3 text-sm active:transform active:scale-95"
                                    >
                                        {searching ? (
                                            <div className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                                        ) : (
                                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                                        )}
                                        {searching ? 'Processing...' : 'Search Courses'}
                                    </button>
                                </div>
                            </div>

                            {/* Content Section */}
                            <div className="animate-fade-in" style={{ animationDelay: '0.2s' }}>
                                {!hasSearched ? (
                                    <div className="border-2 border-dashed border-gray-200 rounded-3xl p-20 flex flex-col items-center justify-center text-center bg-gray-50/50">
                                        <div className="w-20 h-20 bg-white shadow-sm border border-gray-100 rounded-2xl flex items-center justify-center mb-6">
                                            <svg className="w-10 h-10 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" /></svg>
                                        </div>
                                        <h3 className="text-xl font-bold text-gray-800 mb-2">Ready to Search?</h3>
                                        <p className="text-gray-400 max-w-sm font-medium">Please select your preferred semester and department from the dropdowns above to view available courses.</p>
                                    </div>
                                ) : courses.length > 0 ? (
                                    <div className="bg-white rounded-2xl shadow-xl shadow-gray-200/50 overflow-hidden border border-gray-100">
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left border-collapse">
                                                <thead>
                                                    <tr className="bg-gray-50/50">
                                                        <th className="px-6 py-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest">Code</th>
                                                        <th className="px-6 py-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest">Course Name</th>
                                                         <th className="px-6 py-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest text-center">Credit</th>
                                                        <th className="px-6 py-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest">Faculty</th>
                                                        <th className="px-6 py-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest text-center">Material</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-gray-50">
                                                    {courses.map((course) => (
                                                        <tr key={course._id} className="hover:bg-gray-50/80 transition-colors">
                                                            <td className="px-6 py-5">
                                                                <span className="font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded text-xs">{course.code}</span>
                                                            </td>
                                                            <td className="px-6 py-5">
                                                                <p className="font-bold text-gray-800 text-sm">{course.name}</p>
                                                            </td>
                                                            <td className="px-6 py-5 text-center">
                                                                <span className="font-extrabold text-gray-700">{course.credit}</span>
                                                            </td>
                                                             <td className="px-6 py-5">
                                                                <p className="text-sm font-semibold text-gray-600 flex items-center gap-2">
                                                                    <div className="w-6 h-6 rounded-full bg-blue-100 flex items-center justify-center text-[10px] text-blue-600 font-bold">{course.faculty[0]}</div>
                                                                    {course.faculty}
                                                                </p>
                                                            </td>
                                                            <td className="px-6 py-5 text-center">
                                                                <button 
                                                                    onClick={() => openMaterials(course._id)}
                                                                    className="w-10 h-10 bg-gray-50 text-blue-600 border border-gray-100 rounded-xl hover:bg-blue-600 hover:text-white hover:shadow-lg transition-all flex items-center justify-center mx-auto"
                                                                    title="View Materials"
                                                                >
                                                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>
                                                                </button>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="border-2 border-dashed border-gray-200 rounded-3xl p-20 flex flex-col items-center justify-center text-center bg-gray-50/50">
                                        <div className="w-20 h-20 bg-gray-100 rounded-2xl flex items-center justify-center mb-6">
                                            <svg className="w-10 h-10 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
                                        </div>
                                        <h3 className="text-xl font-bold text-gray-800 mb-2">No Courses Found</h3>
                                        <p className="text-gray-400 max-w-sm font-medium">We couldn't find any courses for the selected department and semester.</p>
                                    </div>
                                 )}
                            </div>
                            
                            <MaterialsModal 
                                isOpen={isModalOpen} 
                                onClose={() => setIsModalOpen(false)} 
                                course={selectedCourse} 
                                materials={materials} 
                            />
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AcademicsPage />);
    </script>
</body>

</html>
